<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>练习 · SFI</title>
<link rel="stylesheet" href="common.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

/* Hide built-in speed + vocab (use common injected controls) */
#speed-ctrl, .settings-group .settings-label { display: none !important; }
#vocabNavBtn { display: none !important; }

/* ══════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════ */
:root {
  --bg:         #0d1117;
  --bg2:        #161b22;
  --bg3:        #1c2330;
  --bg4:        #21293a;
  --border:     #2a3444;
  --border2:    #3a4860;
  --text:       #e6edf3;
  --text2:      #8b949e;
  --text3:      #4a5568;
  --sky:        #58a6ff;
  --sky-dim:    rgba(88,166,255,.12);
  --green:      #3fb950;
  --green-dim:  rgba(63,185,80,.12);
  --green-glow: rgba(63,185,80,.3);
  --red:        #f85149;
  --red-dim:    rgba(248,81,73,.12);
  --gold:       #e3b341;
  --gold-dim:   rgba(227,179,65,.12);
  --radius:     14px;
  --radius-sm:  9px;
  --radius-xs:  6px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════ */
.topbar {
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 1rem;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}
.tb-home {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  color: var(--text2);
  text-decoration: none;
  font-size: 1rem;
  transition: all .18s;
  flex-shrink: 0;
}
.tb-home:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

.tb-unit {
  font-size: .78rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: .4rem;
}
.tb-unit .sep { color: var(--text3); }
.tb-unit .name { color: var(--text); font-weight: 600; }

.tb-spacer { flex: 1; }

/* Settings strip */
.tb-settings {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.settings-group {
  display: flex;
  align-items: center;
  gap: .4rem;
  font-size: .7rem;
}
.settings-label {
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .05em;
  white-space: nowrap;
}
.seg-ctrl {
  display: flex;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}
.seg-btn {
  padding: .28rem .6rem;
  font-size: .68rem;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text2);
  transition: all .15s;
  white-space: nowrap;
}
.seg-btn:not(:last-child) { border-right: 1px solid var(--border); }
.seg-btn:hover { background: var(--bg4); color: var(--text); }
.seg-btn.active { background: var(--sky); color: #0d1117; font-weight: 600; }
.seg-btn.active-mode  { background: var(--green); color: #0d1117; font-weight: 600; }
.seg-btn.active-sound { background: var(--gold);  color: #0d1117; font-weight: 600; }

/* ══════════════════════════════════════════════
   PROGRESS BAR
══════════════════════════════════════════════ */
.progress-bar-wrap {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sky), var(--green));
  border-radius: 0 2px 2px 0;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* ══════════════════════════════════════════════
   MAIN PRACTICE AREA
══════════════════════════════════════════════ */
.practice-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem 3rem;
  position: relative;
}

/* Question counter */
.q-counter {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  color: var(--text3);
}
.q-counter .cur { color: var(--text); font-weight: 600; }


.mode-switch { margin-top: -.9rem; }
.mode-switch .seg-ctrl { width: fit-content; }

/* ── QUESTION CARD ── */
.q-card {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: 1.8rem;
  animation: slideIn .3s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Type badge */
.q-type-badge {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  font-size: .65rem;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: .22rem .75rem;
  width: fit-content;
}
.q-type-badge .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--sky);
}

/* Prompt area — clickable for replay */
.q-prompt {
  cursor: pointer;
  user-select: none;
  display: flex;
  flex-direction: column;
  gap: .75rem;
  padding: 1.6rem 1.8rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color .18s, background .18s;
  position: relative;
  overflow: hidden;
}
.q-prompt::before {
  content: '';
  position: absolute;
  top:0; left:0; right:0;
  height: 2px;
  background: linear-gradient(90deg, var(--sky), transparent);
  opacity: .5;
}
.q-prompt:hover { border-color: var(--border2); background: var(--bg3); }
.q-prompt:active { transform: scale(.995); }
.q-prompt.playing { border-color: var(--sky); }
.q-prompt.playing::before { opacity:1; }

.prompt-replay-hint {
  position: absolute;
  bottom: .6rem; right: .8rem;
  font-size: .62rem;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  gap: .3rem;
  transition: color .18s;
}
.q-prompt:hover .prompt-replay-hint { color: var(--sky); }
.prompt-replay-hint .speaker { font-size: .8rem; }

/* Prompt content slots */
.prompt-zh {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.5;
}
.prompt-sv-frame {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  color: var(--text2);
  line-height: 1.5;
}
.prompt-sv-frame .blank {
  display: inline-block;
  min-width: 60px;
  border-bottom: 2px solid var(--border2);
  vertical-align: bottom;
  margin: 0 .15rem;
  color: var(--text3);
  font-size: 1rem;
  font-style: italic;
}
.prompt-hint {
  font-size: .75rem;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}

/* ── INPUT AREA ── */
.q-input-area {
  display: flex;
  flex-direction: column;
  gap: .75rem;
}

/* Single input */
.input-row {
  display: flex;
  align-items: center;
  gap: .6rem;
  flex-wrap: wrap;
}
.input-label {
  font-size: .72rem;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  min-width: 60px;
  flex-shrink: 0;
}

.practice-input {
  flex: 1;
  min-width: 80px;
  padding: .75rem 1rem;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: .95rem;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  transition: border-color .18s, background .18s, box-shadow .18s;
  caret-color: var(--sky);
}
.practice-input:focus {
  border-color: var(--sky);
  background: var(--bg3);
  box-shadow: 0 0 0 3px rgba(88,166,255,.1);
}
.practice-input.correct {
  border-color: var(--green);
  background: var(--green-dim);
  box-shadow: 0 0 0 3px var(--green-glow);
  color: var(--green);
  font-weight: 600;
}
.practice-input.wrong {
  border-color: var(--red);
  background: var(--red-dim);
  animation: shake .3s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}
.practice-input:disabled { cursor: default; }

/* Word-split inputs (for multi-input types) */
.input-chips {
  display: flex;
  align-items: center;
  gap: .4rem;
  flex-wrap: wrap;
}
.practice-input.chip {
  flex: 0 0 auto;
  min-width: 60px;
  width: auto;
  text-align: center;
  padding: .65rem .8rem;
}
.chip-sep {
  color: var(--text3);
  font-size: .85rem;
  font-family: 'DM Serif Display', serif;
}

/* ── FEEDBACK ROW ── */
.feedback-row {
  display: flex;
  align-items: center;
  gap: .75rem;
  min-height: 2.5rem;
}
.feedback-msg {
  font-size: .82rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: .4rem;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .2s, transform .2s;
}
.feedback-msg.show { opacity:1; transform:none; }
.feedback-msg.ok { color: var(--green); }
.feedback-msg.err { color: var(--red); }
.feedback-msg .fb-icon { font-size: 1rem; }

.next-btn {
  margin-left: auto;
  padding: .5rem 1.2rem;
  background: var(--green);
  color: #0d1117;
  border: none;
  border-radius: 100px;
  font-size: .78rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  gap: .3rem;
  opacity: 0;
  pointer-events: none;
  transform: translateX(8px);
}
.next-btn.show { opacity:1; pointer-events:auto; transform:none; }
.next-btn:hover { background: #55d070; transform: scale(1.04); }
.next-btn .kbd {
  font-size: .6rem;
  background: rgba(0,0,0,.2);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .05em;
}

/* ══════════════════════════════════════════════
   COMPLETION SCREEN
══════════════════════════════════════════════ */
.completion-screen {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  text-align: center;
  animation: fadeIn .5s ease both;
}
.completion-screen.show { display: flex; }
@keyframes fadeIn {
  from{opacity:0;transform:scale(.97);}
  to{opacity:1;transform:scale(1);}
}
.completion-icon {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  filter: drop-shadow(0 0 20px rgba(63,185,80,.4));
  animation: pop .5s .1s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop {
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.completion-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  color: var(--text);
  margin-bottom: .5rem;
}
.completion-sub {
  font-size: .82rem;
  color: var(--text2);
  margin-bottom: 2rem;
  line-height: 1.7;
  max-width: 380px;
}

.completion-stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: .75rem;
  margin-bottom: 2rem;
  width: 100%;
  max-width: 420px;
}
.cs-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem .8rem;
  display: flex;
  flex-direction: column;
  gap: .25rem;
}
.cs-val {
  font-family: 'DM Serif Display', serif;
  font-size: 1.7rem;
  line-height: 1;
}
.cs-val.green { color: var(--green); }
.cs-val.sky   { color: var(--sky); }
.cs-val.gold  { color: var(--gold); }
.cs-key { font-size: .67rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

.completion-actions {
  display: flex;
  gap: .6rem;
  flex-wrap: wrap;
  justify-content: center;
}
.ca-btn {
  padding: .65rem 1.4rem;
  border-radius: 100px;
  font-size: .8rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .18s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: .35rem;
}
.ca-primary   { background: var(--sky); color: #0d1117; }
.ca-primary:hover { background: #79b8ff; }
.ca-secondary { background: var(--green); color: #0d1117; }
.ca-secondary:hover { background: #55d070; }
.ca-ghost     { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
.ca-ghost:hover { background: var(--bg4); color: var(--text); }

/* ══════════════════════════════════════════════
   AUTO MODE COUNTDOWN RING
══════════════════════════════════════════════ */
.countdown-ring {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 36px; height: 36px;
  display: none;
  align-items: center;
  justify-content: center;
}
.countdown-ring.show { display: flex; }
.countdown-ring svg { position: absolute; top:0; left:0; transform: rotate(-90deg); }
.countdown-ring circle {
  fill: none;
  stroke: var(--green);
  stroke-width: 3;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  stroke-linecap: round;
  transition: stroke-dashoffset linear;
}
.countdown-ring .inner {
  font-size: .6rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  position: relative;
  z-index: 1;
}

/* ══════════════════════════════════════════════
   WORD-SLOT — 词块填空输入（语言学习 App 风格）
══════════════════════════════════════════════ */
.word-slots-wrap {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 1.2rem;
  flex-wrap: wrap;
  padding: 1rem 0 .5rem;
}
.word-slot-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .5rem;
}
.word-slot-label {
  font-size: .62rem;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .1em;
  text-transform: uppercase;
  height: 1rem;
  line-height: 1;
}
.word-slot {
  background: transparent;
  border: none;
  border-bottom: 3px solid var(--border2);
  border-radius: 0;
  color: var(--text);
  font-size: 1.5rem;
  font-family: 'DM Serif Display', serif;
  text-align: center;
  outline: none;
  padding: .2rem .2rem .4rem;
  min-width: 2.5rem;
  transition: border-color .2s, color .2s;
  caret-color: var(--sky);
  letter-spacing: .04em;
  line-height: 1.2;
}
.word-slot::placeholder {
  color: var(--text3);
  font-size: .9rem;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .05em;
}
.word-slot:focus {
  border-bottom-color: var(--sky);
  border-bottom-width: 3px;
}
.word-slot.correct {
  border-bottom-color: var(--green);
  color: var(--green);
  font-weight: 700;
}
.word-slot.wrong {
  border-bottom-color: var(--red);
  color: var(--red);
  animation: shake .28s ease;
}
/* 纠错锁定态：正确的格，只读不可聚焦 */
.word-slot.slot-locked {
  color: var(--green);
  border-bottom-color: var(--green);
  opacity: .7;
  cursor: default;
  pointer-events: none;
}
.word-slot-sep {
  font-size: 1.3rem;
  color: var(--text3);
  padding-bottom: .5rem;
  font-family: 'DM Serif Display', serif;
  user-select: none;
}

/* ══════════════════════════════════════════════
   INLINE-FILL — 词与输入框同行内联排列
══════════════════════════════════════════════ */
.inline-sentence {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  /* 行间距：换行后词块之间的纵向间距 */
  row-gap: 1.1rem;
  column-gap: .55rem;
  padding: 1.4rem .5rem .8rem;
  line-height: 1;
}
/* 已知词（固定显示） */
.inline-word {
  font-size: 1.55rem;
  font-family: 'DM Serif Display', serif;
  color: var(--text);
  letter-spacing: .015em;
  line-height: 1;
  white-space: nowrap;
  user-select: none;
  /* 底部对齐用 padding 撑出和输入框相同高度 */
  padding-bottom: .3rem;
}
/* 标点（逗号、句号等，紧贴前面的词） */
.inline-punct {
  font-size: 1.55rem;
  font-family: 'DM Serif Display', serif;
  color: var(--text2);
  line-height: 1;
  padding-bottom: .3rem;
  /* 拉近标点与前一个词块的距离 */
  margin-left: -.35rem;
  user-select: none;
}
/* 内联输入格 */
.inline-slot {
  background: transparent;
  border: none;
  border-bottom: 2.5px solid var(--border2);
  border-radius: 0;
  color: var(--sky);          /* 用蓝色区分"待填写" */
  font-size: 1.55rem;
  font-family: 'DM Serif Display', serif;
  font-style: italic;         /* 斜体暗示"空白待填" */
  text-align: center;
  outline: none;
  padding: 0 .2rem .3rem;
  min-width: 2.2rem;
  line-height: 1;
  vertical-align: baseline;
  transition: border-color .18s, color .18s, font-style .18s;
  caret-color: var(--sky);
  letter-spacing: .02em;
}
/* 聚焦：底线变蓝，加光晕 */
.inline-slot:focus {
  border-bottom-color: var(--sky);
  border-bottom-width: 2.5px;
  color: var(--text);
  font-style: normal;
}
/* 有内容时去斜体（用户正在输入） */
.inline-slot:not(:placeholder-shown) {
  font-style: normal;
  color: var(--text);
}
/* 答对 */
.inline-slot.correct {
  border-bottom-color: var(--green);
  color: var(--green);
  font-style: normal;
  font-weight: 700;
}
/* 答错 */
.inline-slot.wrong {
  border-bottom-color: var(--red);
  color: var(--red);
  font-style: normal;
  animation: shake .28s ease;
}
/* 纠错锁定（正确格只读） */
.inline-slot.slot-locked {
  color: var(--green);
  border-bottom-color: var(--green);
  font-style: normal;
  font-weight: 700;
  opacity: .75;
  cursor: default;
  pointer-events: none;
}
/* placeholder 不显示，用空白 + 底线传达"这里要填" */
.inline-slot::placeholder { color: transparent; }
@media (max-width: 600px) {
  .tb-settings { gap: .6rem; }
  .settings-label { display: none; }
  .q-prompt { padding: 1.2rem 1.2rem 2rem; }
  .prompt-zh { font-size: 1rem; }
  .prompt-sv-frame { font-size: 1.1rem; }
  .completion-stats { grid-template-columns: repeat(3,1fr); gap: .4rem; }
}
/* ══════════════════════════════════════════════
   生词本 / 快捷键条 / 答案浮层
══════════════════════════════════════════════ */
/* 生词本图标按钮 */
.tb-vocab-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  color: var(--text2);
  text-decoration: none; font-size: 1.1rem;
  transition: all .18s; flex-shrink: 0; cursor: pointer;
  position: relative;
}
.tb-vocab-btn:hover { background: var(--bg3); color: var(--gold); border-color: var(--border2); }
.vocab-badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--gold); color: #0d1117;
  font-size: .5rem; font-family: 'JetBrains Mono', monospace; font-weight: 700;
  border-radius: 10px; padding: 1px 4px; min-width: 14px;
  text-align: center; display: none;
}
.vocab-badge.show { display: block; }

/* 快捷键提示条（底部固定） */
.shortcut-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 2rem; padding: .5rem 1.5rem;
  background: var(--bg2); border-top: 1px solid var(--border);
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  flex-wrap: wrap;
}
.sc-item {
  display: flex; align-items: center; gap: .35rem;
  font-size: .68rem; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap; cursor: default;
}
.sc-item.sc-hidden { display: none !important; }
.sc-item.sc-active { color: var(--gold); }
.kbd-key {
  display: inline-flex; align-items: center; justify-content: center;
  padding: .16rem .4rem;
  background: var(--bg3); border: 1px solid var(--border2);
  border-bottom: 2px solid var(--border2);
  border-radius: 5px; font-size: .62rem;
  font-family: 'JetBrains Mono', monospace; color: var(--text2); line-height: 1;
}
.sc-item.sc-active .kbd-key { border-color: var(--gold); color: var(--gold); }
.kbd-plus { font-size: .55rem; color: var(--text3); }

/* 答案浮层 */
.answer-reveal {
  position: absolute; inset: 0;
  background: rgba(13,17,23,.88);
  backdrop-filter: blur(6px);
  border-radius: var(--radius);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: .8rem; padding: 1.5rem 2rem; z-index: 20;
}
.answer-reveal.show { display: flex; animation: fadeIn .18s ease both; }
.ar-label {
  font-size: .6rem; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .12em; text-transform: uppercase;
}
.ar-words {
  display: flex; align-items: center;
  justify-content: center; flex-wrap: wrap;
  gap: .4rem .9rem;
}
.ar-word {
  font-size: 1.8rem; font-family: 'DM Serif Display', serif;
  color: var(--gold); letter-spacing: .02em;
}
.ar-hint {
  font-size: .62rem; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}

/* Toast 提示 */
.vocab-toast {
  position: fixed; bottom: 3.8rem; left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--bg2); border: 1px solid var(--gold);
  color: var(--gold); font-size: .75rem;
  font-family: 'Noto Sans SC', sans-serif;
  padding: .4rem 1.1rem; border-radius: 100px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s; z-index: 100;
}
.vocab-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 留出底部快捷键条空间 */
.practice-wrap { padding-bottom: 3.5rem; }
.completion-screen { padding-bottom: 3.5rem; }

/* qPrompt non-clickable */
#qPrompt{cursor:default;}

/* --- flatten Chinese prompt (no box) --- */
#qPrompt{
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  margin: 0 0 18px 0 !important;
  border-radius: 0 !important;
}
#qPrompt .prompt-cn{
  text-align: center !important;
  font-size: 36px !important;
  font-weight: 700 !important;
  letter-spacing: 0.2px;
}
#qPrompt .qTypeBadge{ display:none !important; } /* keep clean; badge already shown elsewhere */


/* --- remove top divider line above Chinese prompt --- */
#qPrompt{ border-top: none !important; }


/* --- remove any remaining divider line near Chinese prompt --- */
#qCard, .q-card { border-top: none !important; }
#qCard::before, .q-card::before { border-top: none !important; border-bottom: none !important; }
#qCard hr, .q-card hr, .divider, .q-divider { display:none !important; }


/* --- remove qPrompt top gradient line --- */
#qPrompt::before{ display:none !important; }


/* --- place Chinese directly above Swedish sentence and center --- */
#qPrompt{
  width: 100% !important;
  max-width: none !important;
  text-align: center !important;
  margin: 0 0 10px 0 !important;
}
#qPrompt .prompt-cn{
  display: block !important;
  width: 100% !important;
  text-align: center !important;
  margin: 0 auto 6px auto !important;
}
#sentenceWrap{
  margin-top: 0 !important;
}

</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     TOPBAR
══════════════════════════════════════════════ -->
<nav class="topbar">
  <a class="tb-home" href="index.html" title="返回主界面">🏠</a>

  <div class="tb-unit">
    <span>SFI</span>
    <span class="sep">›</span>
    <span id="tb-level">B级</span>
    <span class="sep">›</span>
    <span class="name" id="tb-unit-name">单元练习</span>
    <span class="sep">·</span>
    <span style="color:var(--sky);font-size:.68rem;font-family:'JetBrains Mono',monospace;">练习</span>
  </div>

  <div class="tb-spacer"></div>

  <div class="tb-settings">
    <!-- 语速 -->
    <div class="settings-group">
      <span class="settings-label">语速</span>
      <div class="seg-ctrl" id="speed-ctrl">
        <button class="seg-btn" data-speed="1.0" onclick="setSpeed(1.0,this)">1.0×</button>
        <button class="seg-btn" data-speed="0.75" onclick="setSpeed(0.75,this)">0.75×</button>
        <button class="seg-btn active" data-speed="0.5" onclick="setSpeed(0.5,this)">0.5×</button>
      </div>
    </div>
    <!-- 键盘音效 -->
    <div class="settings-group">
      <span class="settings-label">音效</span>
      <div class="seg-ctrl">
        <button class="seg-btn active-sound" data-sound="on" onclick="setSound('on',this)">开</button>
        <button class="seg-btn" data-sound="off" onclick="setSound('off',this)">关</button>
      </div>
    </div>
    <!-- 生词本入口 -->
    <a class="tb-vocab-btn" href="vocab-book.html" title="生词本" id="vocabNavBtn">
      📖
      <span class="vocab-badge" id="vocabBadge"></span>
    </a>
  </div>
</nav>

<!-- 进度条 -->
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<!-- ══════════════════════════════════════════════
     PRACTICE AREA
══════════════════════════════════════════════ -->
<div class="practice-wrap" id="practiceWrap">
  <div class="q-counter">
    题 <span class="cur" id="qCur">1</span> / <span id="qTotal">—</span>
  </div>

  <div class="q-card" id="qCard">

    <!-- 题型标签 -->
    <div class="q-type-badge" id="qTypeBadge">
      <span class="dot"></span>
      <span id="qTypeLabel">—</span>
    </div>

    <!-- 模式切换（基础/进阶） -->
    <div class="mode-switch">
      <div class="seg-ctrl">
        <button class="seg-btn active-mode" id="modeBasicBtn" type="button">基础(B)</button>
        <button class="seg-btn" id="modeAdvBtn" type="button">进阶(B+)</button>
      </div>
    </div>

    <!-- 提示区（可点击重播） -->
    <div class="q-prompt" id="qPrompt">
      <!-- 动态渲染 -->
      <div id="promptContent"></div>
</div>

    <!-- 输入区（根据题型动态渲染） -->
    <div class="q-input-area" id="qInputArea">
    </div>

    <!-- 答案浮层（Cmd+. 触发） -->
    <div class="answer-reveal" id="answerReveal">
      <span class="ar-label">正确答案</span>
      <div class="ar-words" id="arWords"></div>
      <span class="ar-hint">再按 ⌘ + 》 隐藏</span>
    </div>

    <!-- 反馈行 -->
    <div class="feedback-row">
      <div class="feedback-msg" id="feedbackMsg">
        <span class="fb-icon"></span>
        <span class="fb-text"></span>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        下一题 <span class="kbd">Enter</span>
      </button>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════
     COMPLETION SCREEN
══════════════════════════════════════════════ -->
<div class="completion-screen" id="completionScreen">
  <div class="completion-icon">🎉</div>
  <div class="completion-title">恭喜，已完成！</div>
  <div class="completion-sub">你已完成本单元练习，可以继续下一单元，或返回目录查看进度。</div>
  <div class="completion-stats">
    <div class="cs-box">
      <div class="cs-val green" id="stat-total">—</div>
      <div class="cs-key">完成题数</div>
    </div>
    <div class="cs-box">
      <div class="cs-val sky" id="stat-acc">—</div>
      <div class="cs-key">正确率</div>
    </div>
    <div class="cs-box">
      <div class="cs-val gold" id="stat-time">—</div>
      <div class="cs-key">用时</div>
    </div>
  </div>
  <div class="completion-actions">
    <a class="ca-btn ca-primary" id="nextUnitBtn" href="#">➡ 进入下一单元</a>
    <button class="ca-btn ca-secondary" onclick="restartPractice()">🔄 再练一次</button>
    <a class="ca-btn ca-ghost" href="index.html">🏠 返回主界面</a>
  </div>
</div>

<!-- 自动模式倒计时环 -->
<div class="countdown-ring" id="countdownRing">
  <svg viewBox="0 0 36 36" width="36" height="36">
    <circle cx="18" cy="18" r="15.9" id="ringCircle"/>
  </svg>
  <span class="inner" id="ringInner"></span>
</div>

<!-- 快捷键提示条 -->
<div class="shortcut-bar" id="shortcutBar">
  <!-- ⌘ + , 播放发音 x3 -->
  <div class="sc-item" id="sc-play">
    <span class="kbd-key">⌘</span>
    <span class="kbd-plus">+</span>
    <span class="kbd-key">《</span>
    <span>播放发音</span>
  </div>
  <!-- ⌘ + . 查看答案 -->
  <div class="sc-item" id="sc-answer">
    <span class="kbd-key">⌘</span>
    <span class="kbd-plus">+</span>
    <span class="kbd-key">》</span>
    <span>查看答案</span>
  </div>
  <!-- ⌘ + / 生词 -->
  <div class="sc-item" id="sc-vocab">
    <span class="kbd-key">⌘</span>
    <span class="kbd-plus">+</span>
    <span class="kbd-key">/</span>
    <span>标记生词</span>
  </div>
  <!-- Enter 下一题 -->
  <div class="sc-item" id="sc-next">
    <span class="kbd-key">Enter</span>
    <span>下一题 / 检查</span>
  </div>
</div>

<!-- 生词标记 Toast -->
<div class="vocab-toast" id="vocabToast"></div>

<!-- ══════════════════════════════════════════════
     SCRIPT
══════════════════════════════════════════════ -->

<script src="common.js"></script>
<script src="practice-common.js?v=20260414-comparison-chain"></script>

<script>
  (function () {
    const script = document.createElement('script');
    script.src = 'b1_unit1_bank.js';
    script.onload = function () {
      const bank = window.UNIT_BANK_B1;
      if (!bank) {
        console.error('Bank object not found: UNIT_BANK_B1');
        return;
      }

      document.title = `${bank.unitTitle || bank.title || '练习'} · SFI`;
      const tbLevel = document.getElementById('tb-level');
      const tbUnitName = document.getElementById('tb-unit-name');
      if (tbLevel) tbLevel.textContent = 'B级';
      if (tbUnitName) tbUnitName.textContent = bank.unitTitle || bank.title || '单元练习';

      window.SFI_BOOT({
        unit: bank.unit,
        title: bank.unitTitle || bank.title || '',
        basicPool: bank.basicPool || [],
        advancedPool: bank.advancedPool || [],
        properNames: (window.PAGE_CONFIG && window.PAGE_CONFIG.properNames) || []
      });
    };
    script.onerror = function () {
      console.error('Failed to load bank file: b1_unit1_bank.js');
    };
    document.body.appendChild(script);
  })();
</script>
</body>
</html>
